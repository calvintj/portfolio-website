services:
  web:
    build: .
    environment:
      - NODE_ENV=production
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY:-}
    volumes:
      - content_data:/app/data
      - content_uploads:/app/public/uploads
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - homebase_net

volumes:
  content_data:
  content_uploads:

networks:
  homebase_net:
    external: true